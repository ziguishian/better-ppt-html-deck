<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codex Neo-Brutalist Style Preview</title>
  <link rel="stylesheet" href="./styleframe.css" />
</head>
<body>
  <main class="board">
    <section class="cover">
      <div>
        <div class="eyebrow">Neo-Brutalist Codex</div>
        <h1>Codex<br />入门</h1>
      </div>
      <p class="subtitle">从“问 AI”到“让 AI 执行任务”的开发者工作流宣言。</p>
      <div class="hero-line"></div>
    </section>

    <section class="right">
      <div class="panel">
        <h2>Content Slide</h2>
        <div class="content-lines">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="panel">
        <h2>Workflow Diagram</h2>
        <div class="diagram">
          <div class="node">Prompt</div>
          <div class="node">Codex</div>
          <div class="node">Ship</div>
        </div>
      </div>

      <div class="panel">
        <h2>Tokens</h2>
        <div class="swatches">
          <div class="swatch" style="background:#F7F3E8"></div>
          <div class="swatch" style="background:#111111"></div>
          <div class="swatch" style="background:#2F6BFF"></div>
          <div class="swatch" style="background:#F6FF3D"></div>
          <div class="swatch" style="background:#FF4FB8"></div>
        </div>
        <div class="keywords">
          <span>neo brutalist</span>
          <span>bold border</span>
          <span>hard shadow</span>
          <span>dev poster</span>
          <span>editable HTML</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
